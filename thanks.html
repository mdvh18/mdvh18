    <meta charset="UTF-8">

    <title>Ủng Hộ MDVH18 - Tiếp Lửa Đam Mê</title>
    <style>
        body { margin: 0; background: #0f0c29; color: white; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .donate-card { background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 30px; backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); text-align: center; max-width: 450px; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { background: linear-gradient(135deg,#f78f90,#D79BBB); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; font-size: 2.5em; letter-spacing: 2px; }
        .thanks-img { width: 100%; max-width: 200px; border-radius: 20px; margin: 10px 0 25px 0; box-shadow: 0 5px 15px rgba(247, 143, 144, 0.3); animation: float 3s ease-in-out infinite; }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        .info-text { font-size: 16px; color: #eee; line-height: 1.8; margin-bottom: 30px; padding: 0 10px; }
        .ad-btn { display: inline-block; background: linear-gradient(135deg,#f78f90,#D79BBB); color: white; text-decoration: none; font-weight: bold; padding: 15px 30px; border-radius: 50px; transition: 0.3s; box-shadow: 0 4px 15px rgba(247, 143, 144, 0.4); font-size: 16px; border: none; cursor: pointer; }
        .ad-btn:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(247, 143, 144, 0.6); }
        .back-link { display: block; color: #ccc; text-decoration: none; font-size: 13px; margin-top: 25px; transition: 0.3s; }
        .back-link:hover { color: #f78f90; }
        span.heart { color: #f78f90; display: inline-block; animation: beat .3s infinite alternate; }
        @keyframes beat { to { transform: scale(1.2); } }
    </style>
</head>
<body>
    <div class="donate-card">
        <h1>THANK YOU!</h1>
        
        <!-- Ảnh cute cảm ơn -->
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueGZueXF4ZzR4OHR4OHR4OHR4OHR4OHR4OHR4OHR4OHR4OHR4JnB0PW0mcz1n/3oz8xAFtqoNEAfuUqk/giphy.gif" alt="Cảm ơn nè" class="thanks-img">

        <p class="info-text">
            Chân thành cảm ơn bro đã chọn ủng hộ bằng cách xem quảng cáo. <br>
            Mỗi giây ngắn ngủi của bạn là nguồn động lực cực lớn giúp mình và anh em trong team tiếp tục cháy hết mình với đam mê Việt hóa. <span class="heart">❤</span>
        </p>
        <a href="index.html" class="back-link">Quay lại trang chủ</a>
    </div>
